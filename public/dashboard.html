<!DOCTYPE html>

<html lang="en">

<a class="active-link" href="#dashboard">
Dashboard
</a>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Manager Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI,sans-serif;
}

.sidebar{
position:fixed;
left:0;
top:0;
height:100vh;
width:250px;
background:#111827;
padding:20px;
}

.sidebar h3{
color:white;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:#d1d5db;
text-decoration:none;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.sidebar a:hover{
background:#1f2937;
}

.main{
margin-left:270px;
padding:25px;
}

.stat-card{
background:#1e293b;
border:none;
border-radius:18px;
padding:20px;
transition:.3s;
}

.stat-card:hover{
transform:translateY(-5px);
}

.task-card{
background:#1e293b;
border:none;
border-radius:15px;
animation:fadeIn .4s ease;
color:white;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.modal-content{
background:#1e293b;
color:white;
}

.form-control,
.form-select{
background:#0f172a;
color:white;
border:1px solid #374151;
}

.form-control:focus,
.form-select:focus{
background:#0f172a;
color:white;
}

.chart-card{
background:#1e293b;
border-radius:20px;
padding:20px;
}

.active-link{
background:#2563eb;
color:white !important;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Task Manager Pro</h3>

<a href="#">
<i class="bi bi-speedometer2"></i>
Dashboard
</a>

<a href="#">
<i class="bi bi-list-task"></i>
Tasks
</a>

<a href="#">
<i class="bi bi-bar-chart"></i>
Analytics
</a>

<button
class="btn btn-danger w-100 mt-4"
onclick="logout()">

Logout

</button>

</div>

<div class="main">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>
<h2 id="welcomeUser">
Welcome
</h2>
<p class="text-secondary">
Manage your work efficiently
</p>
</div>

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#addTaskModal">

* Add Task

</button>

</div>

<div id="dashboard" class="row mb-4">

<div class="col-md-3">
<div class="stat-card">
<h6>Total Tasks</h6>
<h2 id="totalTasks">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="stat-card">
<h6>Completed</h6>
<h2 id="completedTasks">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="stat-card">
<h6>Pending</h6>
<h2 id="pendingTasks">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="stat-card">
<h6>High Priority</h6>
<h2 id="highPriorityTasks">0</h2>
</div>
</div>

</div>

<div class="row mb-4">

<div class="col-md-6">
<input
id="searchBox"
class="form-control"
placeholder="Search tasks...">
</div>

<div class="col-md-3">
<select
id="statusFilter"
class="form-select">

<option value="">
All Status
</option>

<option>
Pending
</option>

<option>
In Progress
</option>

<option>
Completed
</option>

</select>
</div>

<div class="col-md-3">
<select
id="priorityFilter"
class="form-select">

<option value="">
All Priority
</option>

<option>
Low
</option>

<option>
Medium
</option>

<option>
High
</option>

</select>
</div>

</div>

<div id="analytics" class="chart-card mb-4">
<canvas id="taskChart"></canvas>
</div>

<div id="tasks"></div>

<div id="taskList"></div>

</div>

<!-- Add Task Modal -->

<div
class="modal fade"
id="addTaskModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Add New Task</h5>
</div>

<div class="modal-body">

<input
id="title"
class="form-control mb-3"
placeholder="Task Title">

<textarea
id="description"
class="form-control mb-3"
placeholder="Description"></textarea>

<select
id="status"
class="form-select mb-3">

<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>

</select>

<select
id="priority"
class="form-select mb-3">

<option>Low</option>
<option selected>Medium</option>
<option>High</option>

</select>

<input
type="date"
id="dueDate"
class="form-control">

</div>

<div class="modal-footer">

<button
class="btn btn-primary"
onclick="addTask()">

Save Task

</button>

</div>

</div>

</div>

</div>

<!-- Edit Task Modal -->

<div
class="modal fade"
id="editTaskModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Edit Task</h5>
</div>

<div class="modal-body">

<input
type="hidden"
id="editId">

<input
id="editTitle"
class="form-control mb-3">

<textarea
id="editDescription"
class="form-control mb-3"></textarea>

<select
id="editStatus"
class="form-select mb-3">

<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>

</select>

<select
id="editPriority"
class="form-select mb-3">

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

<input
type="date"
id="editDueDate"
class="form-control">

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="saveEdit()">

Update Task

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const token =
localStorage.getItem("token");

if(!token){
window.location.href =
"login.html";
}

document.getElementById(
"welcomeUser"
).innerText =
"Welcome, " +
(localStorage.getItem("name")
|| "User");

function logout(){

localStorage.removeItem(
"token"
);

localStorage.removeItem(
"name"
);

window.location.href =
"login.html";

}

let chart;

async function addTask(){

    const title =
    document.getElementById("title").value;

    const description =
    document.getElementById("description").value;

    const status =
    document.getElementById("status").value;

    const priority =
    document.getElementById("priority").value;

    const dueDate =
    document.getElementById("dueDate").value;

    try{

        const res =
        await fetch("/api/tasks",{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "x-auth-token":token
            },

            body:JSON.stringify({
                title,
                description,
                status,
                priority,
                dueDate
            })

        });

        const data =
        await res.json();

        console.log(data);

        alert("Task Added Successfully");

        location.reload();

    }catch(err){

        console.error(err);

        alert("Failed to add task");

    }

}

async function loadTasks(){

    try{

        const res =
        await fetch("/api/tasks",{

            headers:{
                "x-auth-token":token
            }

        });

        const tasks =
        await res.json();

        let html = "";

        let completed = 0;
        let pending = 0;
        let highPriority = 0;

        tasks.forEach(task=>{

            if(task.status==="Completed")
                completed++;
            else
                pending++;

            if(task.priority==="High")
                highPriority++;

            html += `
            <div class="card task-card p-3 mb-3">

                <h4>${task.title}</h4>

                <p>${task.description || ""}</p>

                <p>
                Status:
                ${task.status}
                </p>

                <p>
                Priority:
                ${task.priority}
                </p>

                <p>
                Due:
                ${
                    task.dueDate
                    ? new Date(task.dueDate).toLocaleDateString()
                    : "No Due Date"
                }
                </p>

            </div>
            `;
        });

        document.getElementById(
            "taskList"
        ).innerHTML = html;

        document.getElementById(
            "totalTasks"
        ).innerText = tasks.length;

        document.getElementById(
            "completedTasks"
        ).innerText = completed;

        document.getElementById(
            "pendingTasks"
        ).innerText = pending;

        document.getElementById(
            "highPriorityTasks"
        ).innerText = highPriority;

    }catch(err){

        console.error(err);

    }

}
loadTasks();

</script>

</body>
</html>
